# Scan Docker Image for Vulnerabilities using Trivy
name: Image Scan

on:
  workflow_call:

jobs:
  image-scan:
    name: Scan Java Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/java-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          trivyignore: .trivyignore
          
      - name: Update Kubernetes deployment manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/bankapp-deployment.yml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update bankapp image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push

      # SUCCESS EMAIL
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ BankApp CI/CD Success"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            CI/CD Pipeline Completed Successfully

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Docker Image:
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}

            ArgoCD will automatically sync the new image.

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # FAILURE EMAIL
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ BankApp CI/CD Failed"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            CI/CD Pipeline Failed

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Check logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
