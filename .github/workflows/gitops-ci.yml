
name: GitOps CI - Build & Push to DockerHub

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_REPO: rjadhav20/ai-bankapp-eks

jobs:
  build-and-push:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests
        run: ./mvnw test -B
        continue-on-error: true

      - name: Set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
            
      - name: Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignore: ${{ github.workspace }}/.trivyignore

      - name: Update Kubernetes deployment manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/bankapp-deployment.yml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update bankapp image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push

      # SUCCESS EMAIL
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ BankApp CI/CD Success"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            CI/CD Pipeline Completed Successfully

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Docker Image:
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}

            ArgoCD will automatically sync the new image.

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # FAILURE EMAIL
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ BankApp CI/CD Failed"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            CI/CD Pipeline Failed

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Check logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
